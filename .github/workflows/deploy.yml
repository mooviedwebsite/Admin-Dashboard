name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib packages
        run: pnpm run typecheck:libs

      - name: Build streamvault
        env:
          PORT: "3000"
          BASE_PATH: "/Admin-Dashboard/"
          NODE_ENV: production
          VITE_CF_WORKER_URL: ${{ secrets.VITE_CF_WORKER_URL }}
        run: pnpm --filter @workspace/streamvault run build

      - name: Add SPA 404 redirect
        run: cp artifacts/streamvault/dist/public/index.html artifacts/streamvault/dist/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/streamvault/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
