kind = "web"
previewPath = "/"
title = "MooviedWeb"
version = "1.0.0"
id = "artifacts/streamvault"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23593

[services.development]
run = "pnpm --filter @workspace/streamvault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streamvault", "run", "build" ]
publicDir = "artifacts/streamvault/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23593"
BASE_PATH = "/"
